name: Monthly Retrain

on:
  schedule:
    - cron: '0 6 1 * *' # Run at 06:00 UTC on the 1st of every month
  workflow_dispatch:
    inputs:
      end_date:
        description: 'Override end date (YYYY-MM-DD)'
        required: false

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: 1
      SEC_EMAIL: ${{ secrets.SEC_EMAIL }}
      DVC_REMOTE_URL: ${{ secrets.DVC_REMOTE_URL }}
      DVC_REMOTE_USER: ${{ secrets.DVC_REMOTE_USER }}
      DVC_REMOTE_PASSWORD: ${{ secrets.DVC_REMOTE_PASSWORD }}
      CI_GIT_PUSH: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python -m pip install dvc

      - name: Run CI pipeline
        env:
          CI_END_DATE: ${{ github.event.inputs.end_date }}
        run: |
          bash .github/ci/run_pipeline.sh
